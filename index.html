<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Lotto - 로또 번호 생성기</title>
    <style>
        :root {
            --primary-bg: #f3f4f6;
            --white: #ffffff;
            --accent: #4f46e5;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --color-1: #facc15;
            --color-11: #3b82f6;
            --color-21: #ef4444;
            --color-31: #9ca3af;
            --color-41: #10b981;
        }

        [data-theme='dark'] {
            --primary-bg: #111827;
            --white: #1f2937;
            --accent: #818cf8;
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        body { background-color: var(--primary-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); }
        .container { background: var(--white); padding: 3rem; border-radius: 2rem; box-shadow: var(--shadow); text-align: center; max-width: 500px; width: 90%; position: relative; }
        
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(0,0,0,0.05);
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }
        [data-theme='dark'] .theme-toggle { background: rgba(255,255,255,0.1); }

        h1 { margin-bottom: 0.5rem; font-size: 2.5rem; color: var(--accent); letter-spacing: -0.05rem; }
        p { color: var(--text-sub); margin-bottom: 1.5rem; }
        .balls-container { display: flex; justify-content: center; gap: 12px; margin: 2rem 0; min-height: 60px; flex-wrap: wrap; }
        .ball { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); font-size: 1.2rem; transform: scale(0); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes pop {
            to { transform: scale(1); }
        }

        .generate-btn { background-color: var(--accent); color: white; border: none; padding: 1.2rem; font-size: 1.2rem; font-weight: 700; border-radius: 1rem; cursor: pointer; width: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); }
        .generate-btn:active { transform: translateY(0); }
    </style>
</head>
<body>
<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="다크 모드 전환">🌙</button>
    <h1>Vibe Lotto</h1>
    <p>오늘 당신에게 찾아올 행운의 숫자</p>
    <div class="balls-container" id="ballsBox"></div>
    <button class="generate-btn" onclick="generateLotto()">번호 생성하기</button>
</div>
<script>
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
        setTheme(targetTheme);
    }

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
    }

    // 초기 테마 설정
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(savedTheme);

    function getBallColor(num) {
        if (num <= 10) return 'var(--color-1)';
        if (num <= 20) return 'var(--color-11)';
        if (num <= 30) return 'var(--color-21)';
        if (num <= 40) return 'var(--color-31)';
        return 'var(--color-41)';
    }

    function generateLotto() {
        const numbers = [];
        while (numbers.length < 6) {
            const r = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(r)) numbers.push(r);
        }
        numbers.sort((a, b) => a - b);
        const box = document.getElementById('ballsBox');
        box.innerHTML = '';
        numbers.forEach((num, index) => {
            const ball = document.createElement('div');
            ball.className = 'ball';
            ball.style.backgroundColor = getBallColor(num);
            ball.style.animationDelay = (index * 0.05) + 's';
            ball.innerText = num;
            box.appendChild(ball);
        });
    }
    window.onload = generateLotto;
</script>
</body>
</html>
